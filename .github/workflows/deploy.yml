name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci requires package-lock.json to have every platform's optional
      # deps pre-resolved; a Windows-generated lockfile doesn't reliably
      # carry Linux-only native binaries (e.g. rolldown's platform binding)
      # even under plain `npm install` — a known npm optional-deps bug
      # (npm/cli#4828: "Cannot find native binding"). Deleting the lockfile
      # first forces a fresh resolution against the runner's actual
      # platform instead of trusting the Windows-computed one.
      - run: rm -f package-lock.json && npm install

      # Builds both workspaces (apps/couples-app, apps/home-game) via the
      # root package.json "build" script.
      - run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

      # Merge both apps into one Pages artifact: couples-app at the site
      # root (base: /YouAreMyHome/), the game under /game/ (base:
      # /YouAreMyHome/game/) to match each app's Vite `base` config.
      - name: Assemble combined dist/
        run: |
          mkdir -p dist
          cp -r apps/couples-app/dist/. dist/
          mkdir -p dist/game
          cp -r apps/home-game/dist/. dist/game/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
