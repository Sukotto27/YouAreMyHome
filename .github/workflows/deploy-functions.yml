name: Deploy Cloud Functions

on:
  push:
    branches: [master]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install function dependencies
        working-directory: functions
        run: npm install

      # Firebase's Admin SDK / CLI tooling does not support Workload Identity
      # Federation credentials (confirmed via google-github-actions/auth
      # docs), and this org blocks service account key creation entirely.
      # A `firebase login:ci` token is a personal OAuth token, not a service
      # account key, so it isn't affected by that policy.
      - name: Deploy to Firebase Functions
        run: npx firebase-tools@latest deploy --only functions --project youaremyhome-24fa2 --non-interactive --force --token "$FIREBASE_TOKEN"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
