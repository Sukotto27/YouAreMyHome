<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"
    />
    <title>You Are My Home</title>
    <!-- PWA icons/manifest land in Phase 5 -->
    <meta name="theme-color" content="#111111" />
    <style>
      html, body { margin:0; padding:0; height:100%; background:#111; }
      #game { width:100%; height:100%; touch-action: none; }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>

    <div id="loading-overlay" style="
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; z-index: 9999;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.4s ease;
    ">
      <div style="
        font-family: 'TitleFont', Georgia, serif;
        color: #e8d5a3; font-size: 2.2rem; margin-bottom: 32px;
        letter-spacing: 2px; text-align: center;
      ">You Are My Home</div>
      <div style="
        width: 280px; background: #2a2a2a; border-radius: 8px;
        overflow: hidden; border: 1px solid #444;
      ">
        <div id="loading-bar" style="
          height: 14px; width: 0%; background: #c8a96e;
          transition: width 0.35s ease; border-radius: 8px;
        "></div>
      </div>
      <div id="loading-label" style="
        font-family: 'BaseFont', Georgia, serif;
        color: #888; font-size: 0.95rem; margin-top: 14px;
        letter-spacing: 1px;
      ">Loading...</div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>

  <style>

@font-face {
  font-family: "BaseFont";
  src: url("src/fonts/BRADHITC.ttf") format("truetype");
}

@font-face {
  font-family: "TitleFont";
  src: url("src/fonts/QueenAge-Regular.ttf") format("truetype");
}

@font-face {
  font-family: "GlyphFont";
  src: url("src/fonts/Cistercian.ttf") format("truetype");
}

  </style>

</html>
